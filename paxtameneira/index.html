<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards Interativos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="flashcard-container">
        
        <div class="flashcard">
            <div class="card-inner">
                <div class="card-front">
                    <h3>O que é HTML?</h3>
                    <p>Passe o mouse para ver a resposta</p>
                </div>
                <div class="card-back">
                    <p>É a linguagem de marcação utilizada para construir a estrutura de páginas web.</p>
                </div>
            </div>
        </div>

        <div class="flashcard">
            <div class="card-inner">
                <div class="card-front">
                    <h3>O que é CSS?</h3>
                    <p>Passe o mouse para ver a resposta</p>
                </div>
                <div class="card-back">
                    <p>É um mecanismo para adicionar estilo (cores, fontes, espaçamento) a um documento web.</p>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
